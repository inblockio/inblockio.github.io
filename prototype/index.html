<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            var saved = localStorage.getItem('inblock-lang');
            if (saved) { window.location.replace('./' + saved + '/'); return; }
            var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
            window.location.replace(lang.startsWith('de') ? './de/' : './en/');
        })();
    </script>
    <meta http-equiv="refresh" content="0;url=./en/">
    <title>Redirecting — inblock.io</title>
</head>
<body>
    <p>Redirecting... <a href="./en/">English</a> | <a href="./de/">Deutsch</a></p>
</body>
</html>
